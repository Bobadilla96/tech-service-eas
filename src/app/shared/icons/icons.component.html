      <line x1="16" y1="35" x2="32" y2="35" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="20" y1="40" x2="28" y2="40" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
