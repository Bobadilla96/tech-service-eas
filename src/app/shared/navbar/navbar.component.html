<header class="navbar" [class.scrolled]="scrolled">
  <div class="nav-inner">
    <a class="logo" (click)="scrollTo('#inicio')">
      <img src="assets/logo.svg" alt="Tech Service E.A.S" class="logo-img">
    </a>

    <div class="nav-sep"></div>

    <nav class="nav-links" [class.open]="menuOpen">
      <a *ngFor="let link of navLinks" (click)="scrollTo(link.href)">{{ link.label }}</a>
      <a class="nav-cta" (click)="scrollTo('#contacto')">Cotizar</a>
    </nav>

    <button class="theme-toggle" type="button" (click)="toggleTheme()" [attr.aria-label]="theme === 'dark' ? 'Activar modo claro' : 'Activar modo oscuro'">
      <i class="fa-solid" [ngClass]="theme === 'dark' ? 'fa-sun' : 'fa-moon'"></i>
    </button>

    <button class="hamburger" (click)="toggleMenu()" [class.active]="menuOpen" aria-label="Menú">
      <span></span><span></span><span></span>
    </button>
  </div>
</header>
